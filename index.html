<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Jerrix</title>
  <meta name="description" content="Personal site of Jerrix — game developer and founder of Ampelos Studio." />
  <link rel="canonical" href="https://www.jerrix.studio/" />
  <link rel="alternate" hreflang="en" href="https://www.jerrix.studio/" />
  <link rel="alternate" hreflang="zh-Hans" href="https://www.jerrix.studio/zh/" />
  <link rel="alternate" hreflang="x-default" href="https://www.jerrix.studio/" />
  <meta name="theme-color" content="#0b1622" />
  <meta name="color-scheme" content="dark" />

  <!-- Open Graph / social -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Jerrix" />
  <meta property="og:title" content="Jerrix" />
  <meta property="og:description" content="Personal site of Jerrix — game developer and founder of Ampelos Studio." />
  <meta property="og:url" content="https://www.jerrix.studio/" />

  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="32x32" href="assets/games/ess/favicon-32.png?v=2" />
  <link rel="icon" type="image/png" sizes="512x512" href="assets/games/ess/favicon-512.png?v=2" />
  <link rel="apple-touch-icon" href="assets/games/ess/favicon-180.png?v=2" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Jerrix",
    "url": "https://www.jerrix.studio/",
    "jobTitle": "Game Developer",
    "worksFor": { "@type": "Organization", "name": "Ampelos Studio", "url": "https://www.ampelos.studio/" },
    "sameAs": [
      "https://www.ampelos.studio/",
      "https://github.com/jerryjerryxia",
      "https://www.linkedin.com/in/jerryjerryxia/"
    ]
  }
  </script>

  <style>
    :root {
      --bg: #0b1622;
      --bg-2: #0e1c2c;
      --text: #eaf1f8;
      --muted: #8ba0b5;
      --line: rgba(255,255,255,.10);
      --accent: #e0b877;
      --maxw: 720px;
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: radial-gradient(120% 80% at 50% -10%, var(--bg-2), var(--bg) 60%);
      color: var(--text);
      font-family: "Inter", system-ui, -apple-system, "Noto Sans SC", sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; }

    /* Announcement ribbon */
    .ribbon {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: .5rem 1.25rem;
      padding: .7rem 1.25rem;
      font-size: .875rem;
      background: rgba(224,184,119,.06);
      border-bottom: 1px solid var(--line);
      text-align: center;
    }
    .ribbon__msg { color: var(--muted); }
    .ribbon__msg strong { color: var(--text); font-weight: 600; }
    .ribbon a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      white-space: nowrap;
      border-bottom: 1px solid transparent;
      transition: border-color .2s;
    }
    .ribbon a:hover { border-bottom-color: currentColor; }
    .ribbon .sep { color: var(--line); }

    /* Hero / identity */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem;
    }
    .hero { max-width: var(--maxw); text-align: center; }
    .hero__name {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 500;
      font-size: clamp(3rem, 12vw, 6rem);
      letter-spacing: .01em;
      margin: 0;
      line-height: 1.02;
    }
    .hero__tag {
      margin: 1.25rem 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.4vw, 1.15rem);
    }
    .hero__soon {
      margin-top: 2.5rem;
      display: inline-block;
      padding: .4rem 1rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: .8rem;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    /* Footer */
    .footer {
      border-top: 1px solid var(--line);
      padding: 1.75rem 1.5rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: .5rem 1.5rem;
      font-size: .875rem;
      color: var(--muted);
    }
    .footer a { color: var(--muted); text-decoration: none; transition: color .2s; }
    .footer a:hover { color: var(--text); }
    .footer__lang { margin-left: auto; }
    @media (max-width: 560px) { .footer__lang { margin-left: 0; } }
  </style>
</head>
<body>
  <!-- Announcement ribbon -->
  <div class="ribbon">
    <span class="ribbon__msg"><strong>Endless Summer Syndrome</strong> is coming to Steam</span>
    <a href="https://store.steampowered.com/app/4714410/Endless_Summer_Syndrome/" target="_blank" rel="noopener">Wishlist ↗</a>
    <span class="sep" aria-hidden="true">|</span>
    <a href="https://www.ampelos.studio/" target="_blank" rel="noopener">Ampelos Studio ↗</a>
  </div>

  <main>
    <div class="hero">
      <h1 class="hero__name">Jerrix</h1>
      <p class="hero__tag">Game developer &amp; narrative designer. Founder of Ampelos Studio.</p>
      <span class="hero__soon">More coming soon</span>
    </div>
  </main>

  <footer class="footer">
    <a href="mailto:jerryjerryxia@gmail.com">Email</a>
    <a href="https://github.com/jerryjerryxia" target="_blank" rel="noopener">GitHub</a>
    <a href="https://www.linkedin.com/in/jerryjerryxia/" target="_blank" rel="noopener">LinkedIn</a>
    <a href="https://store.steampowered.com/app/4714410/Endless_Summer_Syndrome/" target="_blank" rel="noopener">Steam</a>
    <a class="footer__lang" href="zh/" hreflang="zh-Hans" lang="zh-Hans">中文</a>
  </footer>
</body>
</html>
