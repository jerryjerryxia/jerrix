  <meta charset="UTF-8" />

  <!-- Open Graph / social -->
  <meta property="og:type" content="website" />

  <link rel="icon" type="image/png" sizes="512x512" href="../assets/games/ess/favicon-512.png?v=2" />

  <!-- Structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Jerrix",
    "url": "https://www.jerrix.studio/zh/",
    "jobTitle": "游戏开发者",
    "worksFor": { "@type": "Organization", "name": "蔓工作室", "url": "https://www.ampelos.studio/" },
    "sameAs": [
      "https://www.ampelos.studio/",
      "https://github.com/jerryjerryxia",
      "https://www.linkedin.com/in/jerryjerryxia/"
    ]
  }
  </script>

  <style>
    :root {
      --bg: #0b1622;
      --bg-2: #0e1c2c;
      --text: #eaf1f8;
      --muted: #8ba0b5;
      --line: rgba(255,255,255,.10);
      --accent: #e0b877;
      --maxw: 720px;
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: radial-gradient(120% 80% at 50% -10%, var(--bg-2), var(--bg) 60%);
      color: var(--text);
      font-family: "Inter", "Noto Sans SC", system-ui, -apple-system, sans-serif;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; }

    /* 顶部消息条 */
    .ribbon {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: .5rem 1.25rem;
      padding: .7rem 1.25rem;
      font-size: .875rem;
      background: rgba(224,184,119,.06);
      border-bottom: 1px solid var(--line);
      text-align: center;
    }
    .ribbon__msg { color: var(--muted); }
    .ribbon__msg strong { color: var(--text); font-weight: 600; }
    .ribbon a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      white-space: nowrap;
      border-bottom: 1px solid transparent;
      transition: border-color .2s;
    }
    .ribbon a:hover { border-bottom-color: currentColor; }
    .ribbon .sep { color: var(--line); }

    /* 主体 / 身份 */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem;
    }
    .hero { max-width: var(--maxw); text-align: center; }
    .hero__name {
      font-family: "Fraunces", "Noto Serif SC", Georgia, serif;
      font-weight: 500;
      font-size: clamp(3rem, 12vw, 6rem);
      letter-spacing: .01em;
      margin: 0;
      line-height: 1.02;
    }
    .hero__tag {
      margin: 1.25rem 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 2.4vw, 1.15rem);
    }
    .hero__soon {
      margin-top: 2.5rem;
      display: inline-block;
      padding: .4rem 1rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: .8rem;
      letter-spacing: .16em;
    }

    /* 页脚 */
    .footer {
      border-top: 1px solid var(--line);
      padding: 1.75rem 1.5rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: .5rem 1.5rem;
      font-size: .875rem;
      color: var(--muted);
    }
    .footer a { color: var(--muted); text-decoration: none; transition: color .2s; }
    .footer a:hover { color: var(--text); }
    .footer__lang { margin-left: auto; }
    @media (max-width: 560px) { .footer__lang { margin-left: 0; } }
  </style>
</head>
<body>
  <!-- 顶部消息条 -->
  <div class="ribbon">
    <span class="ribbon__msg"><strong>《无休夏日综合症》</strong>即将登陆 Steam</span>
    <a href="https://store.steampowered.com/app/4714410/Endless_Summer_Syndrome/" target="_blank" rel="noopener">加入愿望单 ↗</a>
    <span class="sep" aria-hidden="true">|</span>
    <a href="https://www.ampelos.studio/" target="_blank" rel="noopener">蔓工作室 ↗</a>
  </div>

  <main>
    <div class="hero">
      <h1 class="hero__name">Jerrix</h1>
      <p class="hero__tag">游戏开发者、叙事设计。蔓工作室创始人。</p>
      <span class="hero__soon">更多内容即将上线</span>
    </div>
  </main>

  <footer class="footer">
    <a href="mailto:jerryjerryxia@gmail.com">邮箱</a>
    <a href="https://github.com/jerryjerryxia" target="_blank" rel="noopener">GitHub</a>
    <a href="https://www.linkedin.com/in/jerryjerryxia/" target="_blank" rel="noopener">LinkedIn</a>
    <a href="https://store.steampowered.com/app/4714410/Endless_Summer_Syndrome/" target="_blank" rel="noopener">Steam</a>
    <a class="footer__lang" href="../" hreflang="en" lang="en">EN</a>
  </footer>
</body>
</html>
